services:
  ps5-control:
    build: .
    container_name: ps5-control
    restart: unless-stopped
    # Published port instead of `network_mode: host`. host mode works on
    # Linux and OrbStack but on Docker Desktop for Mac the "host" is the
    # internal Linux VM, NOT the Mac's actual LAN — so the daemon would
    # be invisible to the Remote 3 even with firewall off. Bridge + port
    # publish works identically on all three platforms (Linux, OrbStack,
    # Docker Desktop) and is the more portable default.
    ports:
      - "${LISTEN_PORT:-8456}:8456"
    environment:
      PS5_HOST:        "${PS5_HOST}"
      PS5_CREDS:       "/data/credentials.json"
      LISTEN_HOST:     "0.0.0.0"
      LISTEN_PORT:     "8456"
      LOG_LEVEL:       "${LOG_LEVEL:-INFO}"
      # Default media-widget art = bundled PNG served by the daemon
      # at /home_image. The UC Remote 3 only renders raster (PNG/JPG),
      # so the previous SVG default never showed up on the widget.
      # Override:
      #   - set HOME_IMAGE_URL=<public-url> to use any external image,
      #   - or HOME_IMAGE_FILE=/path/in/container to a mounted file.
      HOME_IMAGE_URL:  "${HOME_IMAGE_URL:-}"
      HOME_IMAGE_FILE: "${HOME_IMAGE_FILE:-/app/default-home-image.png}"
      # PSN presence — paste your npsso (from https://ca.account.sony.com
      # /api/v1/ssocookie, signed in) on first start. Daemon exchanges it
      # for OAuth tokens persisted in /data/psn_tokens.json. After that
      # you can clear this and the saved tokens take over. Leave empty
      # to disable presence-based cover art / current-title detection.
      PSN_NPSSO_TOKEN:  "${PSN_NPSSO_TOKEN:-}"
      PSN_TOKENS_PATH:  "${PSN_TOKENS_PATH:-/data/psn_tokens.json}"
    volumes:
      - ./credentials.json:/data/credentials.json:ro
      # Persistent token storage so the npsso paste survives container restarts.
      - ./psn_tokens.json:/data/psn_tokens.json
