services:
  ps5-control:
    build: .
    container_name: ps5-control
    restart: unless-stopped
    # Published port instead of `network_mode: host`. host mode works on
    # Linux and OrbStack but on Docker Desktop for Mac the "host" is the
    # internal Linux VM, NOT the Mac's actual LAN — so the daemon would
    # be invisible to the Remote 3 even with firewall off. Bridge + port
    # publish works identically on all three platforms (Linux, OrbStack,
    # Docker Desktop) and is the more portable default.
    ports:
      - "${LISTEN_PORT:-8456}:8456"
    environment:
      PS5_HOST:        "${PS5_HOST}"
      PS5_CREDS:       "/data/credentials.json"
      LISTEN_HOST:     "0.0.0.0"
      LISTEN_PORT:     "8456"
      LOG_LEVEL:       "${LOG_LEVEL:-INFO}"
      # Default media-widget art = the official PS5 wordmark hosted on
      # Wikimedia Commons (since v0.4.21). The Remote 3 fetches the URL
      # directly, so the image never has to live in our repo (just
      # references it). Override:
      #   - set HOME_IMAGE_URL=<other-public-url> for your own art,
      #   - set HOME_IMAGE_URL="" + HOME_IMAGE_FILE=/app/default-home-image.svg
      #     to use the original bundled gamepad SVG instead,
      #   - or HOME_IMAGE_FILE=/path/in/container to a mounted file.
      HOME_IMAGE_URL:  "${HOME_IMAGE_URL:-https://upload.wikimedia.org/wikipedia/commons/c/cb/PlayStation_5_logo_and_wordmark.svg}"
      HOME_IMAGE_FILE: "${HOME_IMAGE_FILE:-/app/default-home-image.svg}"
    volumes:
      - ./credentials.json:/data/credentials.json:ro
